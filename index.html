<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flood Engagement Maps</title>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #f7f9fc;
    color: #333;
    padding: 20px;
  }

  h1 {
    font-family: 'Georgia', serif;
    color: #2a6592;
    text-align: center;
  }

  h2 {
    font-family: 'Arial', sans-serif;
    color: #3a8fb7;
    margin-bottom: 10px;
  }

  h3 {
    margin-bottom: 5px;
    color: #2f6f91;
  }

  .container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 30px;
    margin-top: 20px;
  }

  .column {
    background-color: #ffffff;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }

  ul {
    list-style: none;
    padding-left: 0;
  }

  li {
    margin: 6px 0;
    padding: 8px 12px;
    background-color: #eaf1f7;
    border-radius: 8px;
    transition: background-color 0.3s;
  }

  li:hover {
    background-color: #d1e3f0;
  }

  a {
    text-decoration: none;
    color: #1f4f6b;
    font-weight: 500;
  }

  a:hover {
    color: #10507a;
  }

  /* Responsive: stack on small screens */
  @media (max-width: 700px) {
    .container {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>

<h1>Flood Engagement Maps</h1>

<div class="container">

  <!-- Milwaukee Column -->
  <div class="column">
    <h2>Milwaukee</h2>

    </ul>
  </div>

  <!-- Benton Harbor Column -->
  <div class="column">
    <h2>Benton Harbor</h2>

    <ul>

    </ul>

    <h3>Selection Count</h3>-->

      <li><a href="bh_freq_nolabel.html">Flood Occurrence Selection Map</a></li>

    </ul>
  </div>

</div>

</body>
</html>
